<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tubes WGTIK</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <header>
      <h1>Teachable Machine Pose Model</h1>
      <button type="button" id="start-button">Start</button>
    </header>

    <div id="status">Ready to start webcam.</div>

    <section class="monitor" aria-label="Monitoring status">
      <div class="metric">
        <span>Batas kecurangan</span>
        <strong id="cheat-limit">5</strong>
      </div>
      <div class="metric">
        <span>Deteksi aktif</span>
        <strong id="active-detection">-</strong>
      </div>
      <div class="metric">
        <span>Durasi</span>
        <strong id="detection-duration">0s</strong>
      </div>
    </section>

    <section class="workspace" aria-label="Pose model workspace">
      <div class="camera">
        <canvas id="canvas"></canvas>
      </div>
      <div class="predictions" id="label-container" aria-live="polite"></div>
    </section>
  </main>

  <div class="lock-screen" id="lock-screen" role="dialog" aria-modal="true" aria-labelledby="lock-title">
    <form class="lock-panel" id="lock-form">
      <h2 id="lock-title">Program terkunci</h2>
      <p id="lock-reason">Masukkan password untuk membuka kembali.</p>
      <input type="password" id="password-input" autocomplete="current-password" placeholder="Password">
      <button type="submit">Unlock</button>
      <div id="lock-error" aria-live="polite"></div>
    </form>
  </div>

  <div class="pause-screen" id="pause-screen" role="dialog" aria-modal="true" aria-labelledby="pause-title">
    <div class="pause-panel">
      <h2 id="pause-title">Sistem terpause</h2>
      <p id="pause-reason">sistem terpause click tombol lanjutkan, untuk melanjutkan mengerjakan quis</p>
      <button type="button" id="continue-button">Lanjutkan</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
